[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.11"
warn_return_any = false
disallow_untyped_defs = false
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "sqlalchemy.*",
    "fastapi.*",
    "pydantic.*",
    "uvicorn.*",
    "app.database"
]
ignore_missing_imports = true
ignore_errors = true